version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gym-db-prod
    environment:
      POSTGRES_USER: gym_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      POSTGRES_DB: gym_db
    volumes:
      - gym_db_data_prod:/var/lib/postgresql/data
      - ./init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql
      - ./init-auth-data.sql:/docker-entrypoint-initdb.d/02-init-auth-data.sql
      - ./init-training-data.sql:/docker-entrypoint-initdb.d/03-init-training-data.sql
      - ./init-tracking-data.sql:/docker-entrypoint-initdb.d/04-init-tracking-data.sql
      - ./init-notification-data.sql:/docker-entrypoint-initdb.d/05-init-notification-data.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gym-network
    restart: always

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: gym-auth-prod
    environment:
      SPRING_PROFILES_ACTIVE: production
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gym_db
      SPRING_DATASOURCE_USERNAME: gym_admin
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRATION: 86400000
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gym-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  training-service:
    build:
      context: ./training-service
      dockerfile: Dockerfile
    container_name: gym-training-prod
    environment:
      SPRING_PROFILES_ACTIVE: production
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gym_db
      SPRING_DATASOURCE_USERNAME: gym_admin
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    ports:
      - "8082:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gym-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  tracking-service:
    build:
      context: ./tracking-service
      dockerfile: Dockerfile
    container_name: gym-tracking-prod
    environment:
      SPRING_PROFILES_ACTIVE: production
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gym_db
      SPRING_DATASOURCE_USERNAME: gym_admin
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    ports:
      - "8083:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gym-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: gym-notification-prod
    environment:
      SPRING_PROFILES_ACTIVE: production
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gym_db
      SPRING_DATASOURCE_USERNAME: gym_admin
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    ports:
      - "8084:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gym-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  gym_db_data_prod:

networks:
  gym-network:
    driver: bridge
