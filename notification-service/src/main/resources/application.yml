spring:
  application:
    name: notification-service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        default_schema: notification_schema
  datasource:
    url: jdbc:postgresql://localhost:5432/gym_db
    username: gym_admin
    password: gym_password

server:
  port: 8084
  servlet:
    context-path: /notifications

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

gym:
  openapi:
    title: Notification Service API
    description: Push notifications and user notification management service
  security:
    public-paths: []

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}

firebase:
  config-path: ${FIREBASE_CONFIG_PATH:}
