spring:
  application:
    name: training-service
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: training_schema
  datasource:
    url: jdbc:postgresql://localhost:5432/gym_db
    username: gym_admin
    password: gym_password
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

server:
  port: 8082
  servlet:
    context-path: /training

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

gym:
  openapi:
    title: Training Service API
    description: Exercise, routine, and training program management service
  security:
    public-paths:
      - /api/v1/exercises/system
      - /api/v1/exercises/discipline/**
      - /api/v1/routine-templates/system

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
