spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth(?<segment>/?.*), /auth$\{segment}

        - id: training-service
          uri: http://training-service:8082
          predicates:
            - Path=/training/**
          filters:
            - RewritePath=/training(?<segment>/?.*), /training$\{segment}

        - id: tracking-service
          uri: http://tracking-service:8083
          predicates:
            - Path=/tracking/**
          filters:
            - RewritePath=/tracking(?<segment>/?.*), /tracking$\{segment}

        - id: notification-service
          uri: http://notification-service:8084
          predicates:
            - Path=/notifications/**
          filters:
            - RewritePath=/notifications(?<segment>/?.*), /notifications$\{segment}

server:
  port: 8080
