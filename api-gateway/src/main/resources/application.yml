spring:
  application:
    name: api-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth(?<segment>/?.*), /auth$\{segment}

        - id: training-service
          uri: http://training-service:8082
          predicates:
            - Path=/training/**
          filters:
            - RewritePath=/training(?<segment>/?.*), /training$\{segment}

        - id: tracking-service
          uri: http://tracking-service:8083
          predicates:
            - Path=/tracking/**
          filters:
            - RewritePath=/tracking(?<segment>/?.*), /tracking$\{segment}

        - id: notification-service
          uri: http://notification-service:8084
          predicates:
            - Path=/notifications/**
          filters:
            - RewritePath=/notifications(?<segment>/?.*), /notifications$\{segment}

      global-filters:
        - name: TraceIdFilter
          args:
            enabled: true
        - name: JwtAuthFilter
          args:
            enabled: true

server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
  expiration-ms: 86400000
