spring:
  application:
    name: auth-service
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: auth_schema
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  datasource:
    url: jdbc:postgresql://localhost:5432/gym_db
    username: gym_admin
    password: gym_password
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:your-email@gmail.com}
    password: ${SMTP_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: 8081
  servlet:
    context-path: /auth

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

gym:
  openapi:
    title: Auth Service API
    description: JWT-based authentication and authorization service for Gym Platform
  security:
    public-paths:
      - /register
      - /login
      - /verify
  jwt:
    issuer: gym-platform

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

logging:
  level:
    com.gym: DEBUG
