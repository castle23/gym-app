spring:
  application:
    name: tracking-service
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: tracking_schema
  datasource:
    url: jdbc:postgresql://localhost:5432/gym_db
    username: gym_admin
    password: gym_password

server:
  port: 8083
  servlet:
    context-path: /tracking

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

gym:
  openapi:
    title: Tracking Service API
    description: Diet tracking, measurements, objectives, and progress tracking service
  security:
    public-paths:
      - /api/v1/diet-components/**
      - /api/v1/training-components/**

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
