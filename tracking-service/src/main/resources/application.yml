spring:
  application:
    name: tracking-service
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: tracking_schema
  datasource:
    url: jdbc:postgresql://localhost:5432/gym_db
    username: gym_admin
    password: gym_password

server:
  port: 8083
  servlet:
    context-path: /tracking

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
